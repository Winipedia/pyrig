default_install_hook_types = [
    "post-checkout",
    "post-merge",
    "post-rewrite",
    "pre-commit",
    "pre-push",
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "synchronize-project"
name = "synchronize project"
entry = "uv run pyrig sync"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 0

[[repos.hooks]]
id = "fix-spelling"
name = "fix spelling"
entry = "uv run typos --write-changes"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 1

[[repos.hooks]]
id = "lint-python"
name = "lint python"
entry = "uv run ruff check --fix"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 2

[[repos.hooks]]
id = "format-python"
name = "format python"
entry = "uv run ruff format"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 3

[[repos.hooks]]
id = "lint-markdown"
name = "lint markdown"
entry = "uv run rumdl check --fix"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 4

[[repos.hooks]]
id = "lint-yaml"
name = "lint yaml"
entry = "uv run ryl check . -d 'extends: default' --fix"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 2

[[repos.hooks]]
id = "check-secrets"
name = "check secrets"
entry = "uv run detect-secrets-hook"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 5

[[repos.hooks]]
id = "check-security"
name = "check security"
entry = "uv run bandit -r src/pyrig"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 5

[[repos.hooks]]
id = "check-types"
name = "check types"
entry = "uv run ty check"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 5

[[repos.hooks]]
id = "check-dependencies"
name = "check dependencies"
entry = "uv run deptry"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]
priority = 5

[[repos.hooks]]
id = "update-package-manager"
name = "update package manager"
entry = "uv self update"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "post-checkout",
    "post-merge",
    "post-rewrite",
    "pre-push",
]
priority = 0

[[repos.hooks]]
id = "update-dependencies"
name = "update dependencies"
entry = "uv lock --upgrade"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "post-checkout",
    "post-merge",
    "post-rewrite",
    "pre-push",
]
priority = 1

[[repos.hooks]]
id = "install-dependencies"
name = "install dependencies"
entry = "uv sync"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "post-checkout",
    "post-merge",
    "post-rewrite",
    "pre-push",
]
priority = 2

[[repos.hooks]]
id = "audit-dependencies"
name = "audit dependencies"
entry = "uv run pip-audit"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "post-checkout",
    "post-merge",
    "post-rewrite",
    "pre-push",
]
priority = 3
